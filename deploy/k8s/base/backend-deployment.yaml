apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: atonixcorp/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: atonixcorp-config
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: atonixcorp-app-secrets
                  key: django-secret-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: atonixcorp-app-secrets
                  key: database-url
            - name: PLATFORM_EVENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: atonixcorp-app-secrets
                  key: platform-event-token
          readinessProbe:
            httpGet:
              path: /api/health/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi