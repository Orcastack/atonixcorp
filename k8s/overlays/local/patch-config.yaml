apiVersion: v1
kind: ConfigMap
metadata:
  name: atonixcorp-config
data:
  DJANGO_DEBUG: "true"
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,api.atonixcorp.local"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://app.atonixcorp.local"
  CSRF_TRUSTED_ORIGINS: "http://localhost:3000,http://app.atonixcorp.local"
  FRONTEND_BASE_URL: "http://app.atonixcorp.local"
  APPROVAL_NOTIFICATION_BASE_URL: "http://app.atonixcorp.local"
  DEPLOYMENT_ENVIRONMENT: local
  APP_VERSION: latest
