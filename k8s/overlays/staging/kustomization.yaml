apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base
  - namespace.yaml

patchesStrategicMerge:
  - patch-config.yaml
  - patch-ingress.yaml
  - patch-scale.yaml

images:
  - name: atonixcorp/backend
    newName: registry.example.com/atonixcorp/backend
    newTag: staging
  - name: atonixcorp/app
    newName: registry.example.com/atonixcorp/app
    newTag: staging
