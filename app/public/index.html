<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="description"
    content="AtonixCorp institutional platform for capital operations, API infrastructure, and financial control." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='b' x1='8' y1='8' x2='56' y2='56' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%23081A33'/%3E%3Cstop offset='1' stop-color='%23123B66'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23b)'/%3E%3Cpath d='M32 12 50 19v15c0 10-8 18-18 22-10-4-18-12-18-22V19z' fill='%23fff'/%3E%3Cpath d='M32 17 46 23v11c0 8-6 15-14 19-8-4-14-11-14-19V23z' fill='none' stroke='%237DD3FC' stroke-width='1.5'/%3E%3Ctext x='32' y='40' fill='%23081A33' font-family='Arial,sans-serif' font-size='18' font-weight='700' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <title>AtonixCorp | Governance Platform</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    (function (location) {
      if (location.search[1] === '/') {
        var decoded = location.search
          .slice(1)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(null, null, location.pathname.slice(0, -1) + decoded + location.hash);
      }
    })(window.location);
  </script>
  <script>
    // Suppress benign ResizeObserver errors from Recharts
    window.addEventListener('error', (e) => {
      if (e.message === 'ResizeObserver loop completed with undelivered notifications.' ||
        e.message === 'ResizeObserver loop limit exceeded') {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    });
  </script>
</body>

</html>
