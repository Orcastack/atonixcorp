<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#EE6C4D" />
  <meta name="description"
    content="AtonixCorp institutional platform for capital operations, API infrastructure, and financial control." />
  <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <title>AtonixCorp</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    (function (location) {
      if (location.search[1] === '/') {
        var decoded = location.search
          .slice(1)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(null, null, location.pathname.slice(0, -1) + decoded + location.hash);
      }
    })(window.location);
  </script>
  <script>
    // Suppress benign ResizeObserver errors from Recharts
    window.addEventListener('error', (e) => {
      if (e.message === 'ResizeObserver loop completed with undelivered notifications.' ||
        e.message === 'ResizeObserver loop limit exceeded') {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    });
  </script>
</body>

</html>
