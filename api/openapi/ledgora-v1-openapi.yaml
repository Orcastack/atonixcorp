          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperStatus'
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: /auth/token
          scopes:
            auth:manage: Manage API credentials
            org:read: Read organization metadata
            org:write: Create or modify organization metadata
            team:read: Read roles, permissions, and team members
            team:write: Invite or deactivate team members
            migration:read: Read migration jobs and results
            migration:write: Create or execute migration workflows
            accounts:read: Read chart of accounts data
            accounts:write: Create or modify accounts
            customers:read: Read customer records
            customers:write: Create or modify customers
            vendors:read: Read vendor records
            vendors:write: Create or modify vendors
            invoices:write: Create invoices
            bills:read: Read bills
            bills:write: Create bills
            payments:write: Record invoice or bill payments
            ledger:read: Read journal entries
            ledger:write: Post journal entries or ledger-affecting migrations
            banking:read: Read bank accounts, transactions, and reconciliations
            banking:write: Import bank activity and create reconciliations
            reports:read: Read financial reports
            webhooks:read: Read webhook endpoints and delivery logs
            webhooks:write: Create webhook endpoints or replay events
            audit:read: Read retained system events and audit-facing logs
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  responses:
    StandardBadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    StandardUnauthorized:
      description: Authentication failed or token missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    StandardForbidden:
      description: Access denied or insufficient scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    StandardNotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    StandardRateLimited:
      description: Request was throttled
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
  parameters:
    OrganizationIdHeader:
      name: X-Organization-Id
      in: header
      required: true
      schema:
        type: string
      description: "Tenant-scoping header. Example: org_123"
    IdempotencyKeyHeader:
      name: X-Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: Required for financial POST endpoints to prevent duplicate writes.
  schemas:
    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        primary_country:
          type: string
        primary_currency:
          type: string
    OrganizationSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    CLIUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
    ApiKeyCredential:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
        api_key:
          type: string
          description: Composite CLI-safe API key in `<client_id>.<client_secret>` form.
        scopes:
          type: array
          items:
            type: string
        environment:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RateLimitProfile:
      type: object
      properties:
        name:
          type: string
        requests_per_minute:
          type: integer
        requests_per_day:
          type: integer
    DeveloperAPICategory:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
    DeveloperAPITag:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
    DeveloperAPIEndpoint:
      type: object
      properties:
        id:
          type: integer
        version:
          type: string
        name:
          type: string
        method:
          type: string
        path:
          type: string
        summary:
          type: string
        description:
          type: string
        path_parameters:
          type: array
          items:
            type: object
            additionalProperties: true
        query_parameters:
          type: array
          items:
            type: object
            additionalProperties: true
        headers:
          type: array
          items:
            type: object
            additionalProperties: true
        scopes:
          type: array
          items:
            type: string
        request_example:
          type: string
        response_example:
          type: string
        error_responses:
          type: array
          items:
            type: object
            additionalProperties: true
    DeveloperAPIListItem:
