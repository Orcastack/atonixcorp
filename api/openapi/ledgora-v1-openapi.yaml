openapi: 3.0.3
info:
  title: AtonixCorp API
  version: 1.0.0
  description: >
    AtonixCorp is an institution-grade financial accounting API designed for
    multi-tenant organizations, ledger-driven financial operations, and
    enterprise integrations.
servers:
  - url: https://api.atonixcorp.com/v1
    description: Production
  - url: https://sandbox.api.atonixcorp.com/v1
    description: Sandbox
security:
  - OAuth2: []
tags:
  - name: Developer Portal
  - name: Developer Docs
  - name: Status
  - name: Authentication
  - name: Organizations
  - name: Migration
  - name: Accounts
  - name: Customers
  - name: Vendors
  - name: Invoices
  - name: Bills
  - name: Payments
  - name: Ledger
  - name: Banking
  - name: Reports
  - name: Webhooks
  - name: Audit
x-lgx-error-envelope:
  schema: '#/components/schemas/StandardError'
  note: All runtime v1 error responses are normalized to the StandardError envelope.
x-lgx-scope-policy:
  v1-api-keys:
    GET: [auth:manage]
    POST: [auth:manage]
  v1-api-key-rotate:
    POST: [auth:manage]
  v1-api-key-revoke:
    POST: [auth:manage]
  v1-organizations:
    GET: [org:read]
    POST: [org:write]
  v1-roles:
    GET: [team:read]
  v1-permissions:
    GET: [team:read]
  v1-team-members:
    GET: [team:read]
    POST: [team:write]
  v1-team-member-invitations:
    POST: [team:write]
  v1-team-member-deactivate:
    POST: [team:write]
  v1-migration-jobs:
    GET: [migration:read]
    POST: [migration:write]
  v1-migration-job-detail:
    GET: [migration:read]
  v1-migration-bank-statements:
    POST: [migration:write, banking:write]
  v1-migration-chart-of-accounts:
    POST: [migration:write]
  v1-migration-customers:
    POST: [migration:write]
  v1-migration-historical-financials:
    POST: [migration:write, ledger:write]
  v1-migration-vendors:
    POST: [migration:write]
  v1-migration-invoices:
    POST: [migration:write]
  v1-migration-bills:
    POST: [migration:write]
  v1-migration-transactions:
    POST: [migration:write]
  v1-migration-opening-balances:
    POST: [migration:write]
  v1-accounts:
    GET: [accounts:read]
    POST: [accounts:write]
  v1-customers:
    GET: [customers:read]
    POST: [customers:write]
  v1-vendors:
    GET: [vendors:read]
    POST: [vendors:write]
  v1-bills:
    GET: [bills:read]
    POST: [bills:write]
  v1-bill-payments:
    POST: [payments:write]
  v1-journal-entries:
    GET: [ledger:read]
    POST: [ledger:write]
  v1-invoices:
    POST: [invoices:write]
  v1-invoice-payments:
    POST: [payments:write]
  v1-bank-accounts:
    GET: [banking:read]
    POST: [banking:write]
  v1-bank-account-transactions:
    GET: [banking:read]
    POST: [banking:write]
  v1-reconciliation-matches:
    GET: [banking:read]
    POST: [banking:write]
  v1-trial-balance:
    GET: [reports:read]
  v1-profit-and-loss:
    GET: [reports:read]
  v1-balance-sheet:
    GET: [reports:read]
  v1-cash-flow:
    GET: [reports:read]
  v1-system-events:
    GET: [audit:read]
  v1-webhook-endpoints:
    GET: [webhooks:read]
    POST: [webhooks:write]
  v1-webhook-deliveries:
    GET: [webhooks:read]
  v1-webhook-event-replay:
    POST: [webhooks:write]
paths:
  /auth/token:
    post:
      tags: [Authentication]
      summary: Exchange client credentials for an access token
      operationId: createAccessToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_id, client_secret, grant_type]
              properties:
                client_id:
                  type: string
                client_secret:
                  type: string
                grant_type:
                  type: string
                  enum: [client_credentials]
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
  /auth/cli-login:
    post:
      tags: [Authentication]
      summary: Exchange a CLI API key for a short-lived bearer token
      operationId: cliLogin
      security: []
      servers:
        - url: https://api.atonixcorp.com
          description: Production root
        - url: https://sandbox.api.atonixcorp.com
          description: Sandbox root
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CLIAuthLoginRequest'
      responses:
        '200':
          description: CLI session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CLIAuthSessionResponse'
        '400':
          $ref: '#/components/responses/StandardBadRequest'
        '401':
          $ref: '#/components/responses/StandardUnauthorized'
        '404':
          $ref: '#/components/responses/StandardNotFound'
  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh a CLI bearer token using the stored API key
      operationId: cliRefresh
      security: []
      servers:
        - url: https://api.atonixcorp.com
          description: Production root
        - url: https://sandbox.api.atonixcorp.com
          description: Sandbox root
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CLIAuthRefreshRequest'
      responses:
        '200':
          description: CLI token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CLIAuthSessionResponse'
        '400':
          $ref: '#/components/responses/StandardBadRequest'
        '401':
          $ref: '#/components/responses/StandardUnauthorized'
  /auth/me:
    get:
      tags: [Authentication]
      summary: Validate the current CLI session
      operationId: cliAuthMe
      servers:
        - url: https://api.atonixcorp.com
          description: Production root
        - url: https://sandbox.api.atonixcorp.com
          description: Sandbox root
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: CLI session is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CLIAuthMeResponse'
        '401':
          $ref: '#/components/responses/StandardUnauthorized'
        '403':
          $ref: '#/components/responses/StandardForbidden'
  /api-keys:
    get:
      tags: [Authentication]
      summary: List OAuth client applications for an organization
      operationId: listApiKeys
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: API keys listed
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Authentication]
      summary: Create an OAuth client application
      operationId: createApiKey
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCredential'
  /organizations:
    get:
      tags: [Organizations]
      summary: List accessible organizations
      operationId: listOrganizations
      responses:
        '200':
          description: Organization list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
  /migration/jobs:
    get:
      tags: [Migration]
      summary: List migration jobs
      operationId: listMigrationJobs
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Migration jobs listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [Migration]
      summary: Create a migration job
      operationId: createMigrationJob
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrationJobRequest'
      responses:
        '201':
          description: Migration job created
          content:
            application/json:
              schema:
                type: object
  /accounts:
    get:
      tags: [Accounts]
      summary: List chart of accounts
      operationId: listAccounts
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Accounts listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
    post:
      tags: [Accounts]
      summary: Create a ledger account
      operationId: createAccount
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
  /customers:
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Customers listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
    post:
      tags: [Customers]
      summary: Create a customer
      operationId: createCustomer
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
  /vendors:
    get:
      tags: [Vendors]
      summary: List vendors
      operationId: listVendors
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Vendors listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Vendor'
    post:
      tags: [Vendors]
      summary: Create a vendor
      operationId: createVendor
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vendor'
  /invoices:
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Invoices listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
    post:
      tags: [Invoices]
      summary: Create a new invoice
      operationId: createInvoice
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreateRequest'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
  /invoices/{invoice_id}/payments:
    post:
      tags: [Payments]
      summary: Record a payment against an invoice
      operationId: createInvoicePayment
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: invoice_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
  /bills:
    get:
      tags: [Bills]
      summary: List bills
      operationId: listBills
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Bills listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Bill'
    post:
      tags: [Bills]
      summary: Create a new bill
      operationId: createBill
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillCreateRequest'
      responses:
        '201':
          description: Bill created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
  /bills/{bill_id}/payments:
    post:
      tags: [Payments]
      summary: Record a payment against a bill
      operationId: createBillPayment
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: bill_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Bill payment recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
  /ledger/journal-entries:
    get:
      tags: [Ledger]
      summary: List journal entries
      operationId: listJournalEntries
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Journal entries listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JournalEntry'
    post:
      tags: [Ledger]
      summary: Post a journal entry
      operationId: createJournalEntry
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryCreateRequest'
      responses:
        '201':
          description: Journal entry posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerEntryResponse'
  /bank-accounts:
    get:
      tags: [Banking]
      summary: List linked bank accounts
      operationId: listBankAccounts
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Bank accounts listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BankAccount'
    post:
      tags: [Banking]
      summary: Link an external bank account
      operationId: createBankAccount
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccount'
      responses:
        '201':
          description: Bank account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
  /bank-accounts/{bank_account_id}/transactions:
    get:
      tags: [Banking]
      summary: List imported bank transactions
      operationId: listBankTransactions
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: bank_account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bank transactions listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BankTransaction'
    post:
      tags: [Banking]
      summary: Import bank transactions
      operationId: importBankTransactions
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
        - name: bank_account_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactions]
              properties:
                transactions:
                  type: array
                  items:
                    $ref: '#/components/schemas/BankTransaction'
      responses:
        '201':
          description: Transactions imported
          content:
            application/json:
              schema:
                type: object
  /reconciliation/matches:
    get:
      tags: [Banking]
      summary: List reconciliation matches
      operationId: listReconciliationMatches
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Reconciliation matches listed
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Banking]
      summary: Match a bank transaction to a ledger entry
      operationId: createReconciliationMatch
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bank_transaction_id, ledger_entry_id, match_type]
              properties:
                bank_transaction_id:
                  type: string
                ledger_entry_id:
                  type: string
                match_type:
                  type: string
                  enum: [exact, manual, partial]
                matched_amount:
                  type: number
                  format: double
      responses:
        '201':
          description: Reconciliation completed
          content:
            application/json:
              schema:
                type: object
  /reports/trial-balance:
    get:
      tags: [Reports]
      summary: Generate a trial balance report
      operationId: getTrialBalance
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: as_of_date
          in: query
          schema:
            type: string
            format: date
        - name: currency
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Trial balance report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /reports/profit-and-loss:
    get:
      tags: [Reports]
      summary: Generate a profit and loss report
      operationId: getProfitAndLoss
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: currency
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Profit and loss report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /reports/balance-sheet:
    get:
      tags: [Reports]
      summary: Generate a balance sheet report
      operationId: getBalanceSheet
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: as_of_date
          in: query
          schema:
            type: string
            format: date
        - name: currency
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Balance sheet report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /reports/cash-flow:
    get:
      tags: [Reports]
      summary: Generate a cash flow statement
      operationId: getCashFlow
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: from_date
          in: query
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
        - name: currency
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Cash flow report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /webhooks/endpoints:
    get:
      tags: [Webhooks]
      summary: List registered webhook endpoints
      operationId: listWebhookEndpoints
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Webhook endpoints listed
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [Webhooks]
      summary: Register a webhook endpoint
      operationId: createWebhookEndpoint
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Webhook endpoint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEvent'
  /webhooks/deliveries:
    get:
      tags: [Webhooks]
      summary: List webhook delivery logs
      operationId: listWebhookDeliveries
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: Webhook deliveries listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookEvent'
  /webhooks/events/{event_id}/replay:
    post:
      tags: [Webhooks]
      summary: Replay a stored webhook event
      operationId: replayWebhookEvent
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook event replayed
          content:
            application/json:
              schema:
                type: object
  /events:
    get:
      tags: [Audit]
      summary: List retained system events
      operationId: listSystemEvents
      parameters:
        - $ref: '#/components/parameters/OrganizationIdHeader'
      responses:
        '200':
          description: System events listed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookEvent'
  /:
    get:
      tags: [Developer Portal]
      summary: Render the public AtonixCorp API landing page
      operationId: renderDeveloperLandingPage
      security: []
      servers:
        - url: https://api.atonixcorp.com
          description: Production root
        - url: https://sandbox.api.atonixcorp.com
          description: Sandbox root
      responses:
        '200':
          description: NASA-style landing page HTML
          content:
            text/html:
              schema:
                type: string
  /apis:
    get:
      tags: [Developer Portal]
      summary: List published APIs in the public catalog
      operationId: listDeveloperCatalogApis
      security: []
      servers:
        - url: https://api.atonixcorp.com
          description: Production root
        - url: https://sandbox.api.atonixcorp.com
          description: Sandbox root
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
