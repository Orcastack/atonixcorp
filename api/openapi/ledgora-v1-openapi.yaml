      tags: [Developer Portal]
      summary: Search across published APIs and endpoint metadata
      operationId: searchDeveloperCatalog
      security: []
      servers:
        - url: https://api.atonixcorp.com
          description: Production root
        - url: https://sandbox.api.atonixcorp.com
          description: Sandbox root
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
